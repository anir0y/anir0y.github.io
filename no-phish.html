<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NO-Phish-404</title>
</head>
<style>
:root{
  --white: #fafafa;
}
body{
  height: 100vh;
  background-color: #b2ebf2;
  display: flex;
  justify-content: center;
  align-items: center;
}
.cat{
  height: 300px;
  width: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.head-container{
  position: relative;
  width: 200px;
  height: 100px;
}
.head{
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translate(-50%);
  width: 204px;
  height: 200px;
  clip-path: circle(50% at 50% 100%);
  background-color: var(--white);
}
 .ear {
  position: absolute;
  height: 80px;
  width: 80px;
  background-color: var(--white);
 clip-path: polygon(51% 0, 61% 3%, 66% 9%, 69% 17%, 100% 100%, 0 100%, 28% 16%, 33% 7%, 41% 1%);
}
.ear.left{
  transform: rotate(-40deg);
  top: -10px;
}
.ear.right{
  right: 5px;
  top: -12px;
  transform: rotate(40deg);
}
.ear.left::before{
  content: "";
  position: absolute;
  background-color: pink;
  height: 30px;
  width: 20px;
  border-radius: 100%;
  left: 30px;
  top: 6px;
}
.ear.right::before{
  content: "";
  position: absolute;
  background-color: pink;
  height: 30px;
  width: 20px;
  border-radius: 100%;
  left: 29px;
  top: 6px;
}
.eye{
  position: absolute;
  height: 30px;
  width: 30px;
  border-radius: 100%;
  background-color: black;
}
.eye.left{
  top: 50px;
  left: 50px;
 }
.eye.left::after{
  content:"";
  position:absolute;
  height: 10px;
  width: 10px;
  border-radius: 100%;
  background-color: var(--white);
  left: 14px;
  top: 5px;
  animation-name: eyeMove;
  animation-duration: 7s;
  animation-iteration-count: infinite;
  animation-timing-function: ease-in;
}
.eye.right{
  top: 50px;
  left: 120px;
}
.eye.right::after{
  content:"";
  position:absolute;
  height: 10px;
  width: 10px;
  border-radius: 100%;
  background-color: var(--white);
  left: 14px;
  top: 5px;
  animation-name: eyeMove;
  animation-duration: 7s;
  animation-iteration-count: infinite;
  animation-timing-function: ease-in;
}
@keyframes eyeMove{
  0% {
    left: 10%;
  }
  5% {
    left: 50%;
  }
  60% {
    left: 50%;
  }
  65% {
    left: 10%;
  }
  100% {
    left:10%;
  }
}
.nose{
  position:absolute;
  height: 30px;
  width: 25px;
  background-color: black;
  clip-path: ellipse(50% 22% at 50% 50%);
  top: 58px;
  left: 88px;
}
.mouth{
  position: absolute;
  height: 12px;
  width: 3px;
  border-radius: 10px;
  background-color: black;
  top: 79px;
  left: 98px;
  transform-origin: center 0%;
  transform: rotate(15deg);
 }
.mouth::after{
  content:"";
  position: absolute;
  height: 13px;
  width: 3px;
  border-radius: 10px;
  background-color: black;
  top:-2px;
  left: 5px;
  transform: rotate(-25deg);
}
.whiskers{
  position: absolute;
  height: 1px;
  width: 60px;
  background-color: black;
 }
.whiskers.left{
  top: 80px;
  left: -30px;
  transform: rotate(10deg);
  transform-origin: center 100%;
 }
.whiskers.left::before{
  content:"";
  position: absolute;
  height: 1px;
  width: 50px;
  background-color: black;
  top: -10px;
  left: 5px;
  transform:rotate(5deg);
}
.whiskers.left::after{
  content:"";
  position: absolute;
  height: 1px;
  width: 50px;
  background-color: black;
  top: 10px;
  left: 5px;
  transform:rotate(-5deg);
}
.whiskers.right{
  top: 80px;
  right: -28px;
  transform: rotate(-10deg);
  transform-origin: center 100%;
}
.whiskers.right::before{
  content:"";
  position: absolute;
  height: 1px;
  width: 50px;
  background-color: black;
  top: -10px;
  right: 1px;
  transform: rotate(-5deg);
}
.whiskers.right::after{
  content:"";
  position: absolute;
  height: 1px;
  width: 50px;
  background-color: black;
  top: 10px;
  right: 1px;
  transform: rotate(5deg);
}
.body{
  position: relative;
  background-color: var(--white);
  height: 150px;
  width: 200px;
  border-bottom-right-radius: 50px;
  border-bottom-left-radius: 50px;
 }
.feet{
  position: absolute;
  bottom: -20px;
  left: 20%;
  height: 40px;
  width:40px;
  background-color: var(--white);
  border-radius: 100%;
}
.feet::after{
  content: "";
  position:absolute;
  bottom: 0;
  left: 200%;
  height: 40px;
  width:40px;
  background-color: var(--white);
  border-radius: 100%;
}
h1{
    color: black;
    font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    font-size-adjust: inherit;
    font-size: 5vh;
}

</style>

    <body>
        <div class="cat">
          <div class="head-container">
            <div class="head"></div>
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="nose"></div>
              <div class="mouth"></div>
             <div class="whiskers left"></div>
             <div class="whiskers right"></div>
          </div>
          <div class="body">
           <div class="feet"></div>
            </div>
          </div>
        </div>
      <h1>Hey Meow!</h1>
      
    </body>

</html>
