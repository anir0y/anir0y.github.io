<script>
/* Reverse guard: this is the dedicated phone edition. Desktop visitors who land
   here (shared link, search) bounce to the full experience unless they chose
   mobile explicitly. ?view=mobile|desktop pins a choice in localStorage. */
(function () {
  try {
    var pick = new URLSearchParams(location.search).get("view");
    if (pick === "desktop" || pick === "mobile") localStorage.setItem("anir0y:view", pick);
    var pref = localStorage.getItem("anir0y:view");
    if (pref === "mobile") return;
    var phone = /Mobi|iPhone|iPod/i.test(navigator.userAgent);
    var coarse = !!(window.matchMedia && matchMedia("(pointer: coarse)").matches);
    if (pref === "desktop" || (!phone && !coarse)) location.replace("../" + location.hash);
  } catch (e) { /* stay */ }
})();
</script>
