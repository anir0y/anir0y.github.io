# Build once, deploy the SAME artifact to every mirror in parallel.
# Keeping all origins on an identical build is what makes health-checked
# failover correct. Set the listed repo secrets to enable each target.
name: deploy-multihost

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist, retention-days: 7 }

  cloudflare-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=anir0y

  netlify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - name: Deploy to Netlify
        run: npx --yes netlify-cli@17 deploy --prod --dir=dist --message="CI ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  verify:
    needs: [cloudflare-pages, netlify]
    runs-on: ubuntu-latest
    steps:
      - name: Confirm every mirror serves the same build
        run: |
          SHA="${{ github.sha }}"
          fail=0
          for url in "$CF_URL" "$NETLIFY_URL"; do
            [ -z "$url" ] && continue
            got=$(curl -fsS "$url/health.json" | grep -o '"commit": *"[^"]*"' || true)
            echo "$url -> $got"
            echo "$got" | grep -q "$SHA" || { echo "::warning::$url not yet on $SHA"; fail=1; }
          done
          exit 0   # warn only; CDNs may need a moment to propagate
        env:
          CF_URL: ${{ vars.CF_URL }}
          NETLIFY_URL: ${{ vars.NETLIFY_URL }}
